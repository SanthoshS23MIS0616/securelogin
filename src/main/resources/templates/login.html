<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | Sign in</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script defer th:src="@{/js/app.js}"></script>
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="visual-panel">
        <div class="brand-lock">
            <img th:src="@{/images/shield-mark.svg}" alt="" class="brand-mark">
            <span>Secure Login</span>
        </div>
        <div class="orbital-shield" aria-hidden="true">
            <span class="orbit orbit-one"></span>
            <span class="orbit orbit-two"></span>
            <span class="core-lock"></span>
        </div>
        <h1>Protected access, cleanly handled.</h1>
    </section>

    <section class="form-panel">
        <div class="panel-heading">
            <p class="eyebrow">Welcome back</p>
            <h2>Sign in</h2>
        </div>

        <div class="alert success" th:if="${success}" th:text="${success}"></div>
        <div class="alert notice" th:if="${param.logout}">You have been logged out.</div>
        <form th:action="@{/login}" th:object="${loginForm}" method="post" class="stacked-form" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="alert error" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            <label>
                <span>Email</span>
                <input type="email" th:field="*{email}" autocomplete="email" placeholder="you@example.com" required>
                <small class="field-error" th:errors="*{email}"></small>
            </label>
            <div class="field-group">
                <label for="password">Password</label>
                <span class="password-wrap">
                    <input type="password" th:field="*{password}" autocomplete="current-password" placeholder="Enter your password" required>
                    <button class="icon-button reveal-password" type="button" aria-label="Show password" title="Show password">View</button>
                </span>
                <small class="field-error" th:errors="*{password}"></small>
            </div>
            <button class="primary-button" type="submit">Sign in securely</button>
        </form>

        <p class="switch-link">New here? <a th:href="@{/register}">Create an account</a></p>
    </section>
</main>
<footer class="site-footer">&lt;&lt;Santhosh S - Software Engineer&gt;&gt;</footer>
</body>
</html>
